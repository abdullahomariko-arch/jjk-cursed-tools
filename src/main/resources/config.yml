prefix: "§8[§dJJK§8]§r "

data:
  persistCooldownsOnDeath: true

cursedEnergy:
  max: 10
  regen:
    amountPerTick: 1
    tickSeconds: 4

ui:
  cooldownActionbar:
    enabled: true
    # If multiple timers exist, show the one with the lowest remaining seconds
    preferShortest: true
  cooldownBossbar:
    longTimerThresholdSeconds: 45
  cursedEnergyBossbar:
    enabled: true
    title: "§dCursed Energy §8|§r {bar} §7({value}/{max})"
    filledChar: "■"
    emptyChar: "□"
  nullified:
    titleMain: "§cTECHNIQUE NULLIFIED"
    subtitle: "§7Your technique is sealed."
    bossbarTitle: "§cNULLIFIED §8|§r {time}"

techniques:
  gravity:
    displayName: "Gravity"
    # hex-like vibe: purple
    color: "#8A2BE2"

tools:
  dragon_bone:
    displayName: "§5Dragon Bone (Ryuukotsu)"
    material: NETHERITE_SWORD
    customModelData: 10001
    ceCost: 2
    cooldownSeconds: 25
    dash:
      speed: 1.55
      durationTicks: 14
      bonusDamageHearts: 3.0
    visuals:
      sound: "ENTITY_IRON_GOLEM_STEP"
      particle: "CRIT"
  split_soul_katana:
    displayName: "§fSplit Soul Katana"
