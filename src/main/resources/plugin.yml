name: JJKCursedTools
main: me.axebanz.jJK.JJKCursedToolsPlugin
version: 1.0.0
api-version: "1.21"
author: AxeBanz
description: JJK-inspired cursed tools + techniques + CE + strong UI/UX for Paper 1.21.x

commands:
  jjk:
    description: Main command for JJKCursedTools
    usage: /jjk help
  wheel:
    description: Divine Wheel category switching
    usage: /wheel <next|set|status> [category]

permissions:
  jjk.admin:
    default: op
  jjk.reload:
    default: op
  jjk.give:
    default: op
  jjk.technique:
    default: op
  jjk.status:
    default: op
  jjk.wheel:
    default: true
